<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>
<body>
	<sdpi-item label="Show header">
		<sdpi-checkbox setting="showHeader" default="true" label="Show text in top-left corner"></sdpi-checkbox>
	</sdpi-item>
	<sdpi-item label="Header text">
		<sdpi-textfield setting="headerText" default="ATK" placeholder="ATK"></sdpi-textfield>
	</sdpi-item>
	<sdpi-item label="Use mouse colors">
		<sdpi-checkbox setting="useMouseColors" default="true"
			label="Read stage colors from the mouse (like the DPI LED)"></sdpi-checkbox>
	</sdpi-item>
	<sdpi-item label="Color stage 1">
		<sdpi-color setting="color1" default="#ff0000"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Color stage 2">
		<sdpi-color setting="color2" default="#00ff00"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Color stage 3">
		<sdpi-color setting="color3" default="#0000ff"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Color stage 4">
		<sdpi-color setting="color4" default="#ff00ff"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="No dongle background">
		<sdpi-color setting="bgNoDongle" default="#550000"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Background">
		<sdpi-color setting="background" default="#1a1a1a"></sdpi-color>
	</sdpi-item>
	<sdpi-item>
		<div style="font-size: 11px; opacity: 0.7;">Custom colors only apply when "Use mouse colors" is disabled.</div>
	</sdpi-item>
</body>
</html>
