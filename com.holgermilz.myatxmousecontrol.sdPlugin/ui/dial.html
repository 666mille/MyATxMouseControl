<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>
<body>
	<sdpi-item label="Show header">
		<sdpi-checkbox setting="showHeader" default="true" label="Show text in top-left corner"></sdpi-checkbox>
	</sdpi-item>
	<sdpi-item label="Header text">
		<sdpi-textfield setting="headerText" default="ATK" placeholder="ATK"></sdpi-textfield>
	</sdpi-item>
	<sdpi-item label="Color DPI mode">
		<sdpi-color setting="colorDpi" default="#40a0ff"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Color polling mode">
		<sdpi-color setting="colorPolling" default="#ffb020"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Color firmware mode">
		<sdpi-color setting="colorSensor" default="#ff4040"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="Color battery">
		<sdpi-color setting="colorBattery" default="#3ad35f"></sdpi-color>
	</sdpi-item>
	<sdpi-item label="No dongle background">
		<sdpi-color setting="bgNoDongle" default="#550000"></sdpi-color>
	</sdpi-item>
</body>
</html>
